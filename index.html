<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Poser - Gemini AI Enhanced</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #050505;
            color: #e0e0e0;
            touch-action: none;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(15, 15, 15, 0.92);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #333;
            max-width: 340px;
            max-height: 90vh;
            overflow-y: auto;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        h2 { margin: 0 0 4px 0; font-size: 22px; color: #00acee; font-weight: 800; }
        .subtitle { font-size: 10px; color: #777; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        label { font-size: 11px; color: #aaa; display: block; margin-top: 12px; margin-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        
        select, button, textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        button { 
            background: linear-gradient(135deg, #00acee 0%, #0072ff 100%); 
            color: white;
            border: none; 
            font-weight: 700; 
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.98); }
        button.secondary {
            background: #222;
            border: 1px solid #444;
            color: #eee;
        }

        .ai-section {
            background: rgba(0, 172, 238, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 172, 238, 0.2);
            margin-top: 15px;
        }

        #feedback-area {
            margin-top: 15px;
            padding: 12px;
            background: #000;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            color: #ddd;
            border-left: 3px solid #00acee;
            display: none;
        }

        .hidden-input { display: none; }
        
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }
        .spinner {
            border: 4px solid rgba(0, 172, 238, 0.1);
            border-left-color: #00acee;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text" style="color: #00acee; margin-top: 20px; font-weight: 600;">Gemini is thinking...</p>
    </div>

    <div id="ui-container">
        <h2>3D Poser</h2>
        <div class="subtitle">AI-driven reference for artists</div>
        
        <label>Standard Poses</label>
        <select id="poseSelect">
            <option value="standing">Standing (Neutral)</option>
            <option value="walking">Walking</option>
            <option value="running">Running</option>
            <option value="sitting">Sitting</option>
            <option value="crouching">Crouching</option>
            <option value="jumping">Jumping</option>
            <option value="action">Hero Landing</option>
            <option value="flying">Flying / Floating</option>
            <option value="sleeping">Lying Down</option>
        </select>

        <div class="ai-section">
            <label>✨ AI Pose Generator</label>
            <textarea id="aiPrompt" placeholder="Describe a pose (e.g., 'a person tying their shoes')..."></textarea>
            <button id="generateBtn">Generate Pose ✨</button>
        </div>

        <div class="ai-section" style="background: rgba(255, 255, 255, 0.03); border-color: rgba(255,255,255,0.1);">
            <label>✨ Tools & Analysis</label>
            <button class="secondary" id="improveLightingBtn">Improve Lighting ✨</button>
            <div style="height: 8px;"></div>
            <button class="secondary" onclick="document.getElementById('fileInput').click()">Upload Sketch ✨</button>
            <input type="file" id="fileInput" class="hidden-input" accept="image/*">
        </div>

        <div id="feedback-area"></div>
        
        <div style="margin-top: 20px; font-size: 11px; color: #555;">
            Interaction:<br>
            • Left Click/Touch: Rotate view<br>
            • Right Click: Pan view<br>
            • Scroll: Zoom
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let scene, camera, renderer, mannequinGroup;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        const limbs = {};
        let rimLight, mainLight;

        // Anatomical constraints
        const constraints = {
            head: { x: [-0.6, 0.8], y: [-1.2, 1.2], z: [-0.4, 0.4] },
            chest: { x: [-0.3, 0.5], y: [-0.7, 0.7], z: [-0.3, 0.3] },
            leftShoulder: { x: [-1.5, 3.1], y: [-1.2, 1.2], z: [-1.5, 0.5] },
            rightShoulder: { x: [-1.5, 3.1], y: [-1.2, 1.2], z: [-0.5, 1.5] },
            leftElbow: { x: [-2.5, 0] },
            rightElbow: { x: [-2.5, 0] },
            leftHip: { x: [-1.8, 0.5], y: [-0.5, 0.5], z: [-0.5, 0.2] },
            rightHip: { x: [-1.8, 0.5], y: [-0.5, 0.5], z: [-0.2, 0.5] },
            leftKnee: { x: [0, 2.5] },
            rightKnee: { x: [0, 2.5] }
        };

        const clamp = (val, range) => range ? Math.max(range[0], Math.min(range[1], val)) : val;

        // --- GEMINI API INTEGRATION ---
        
        async function callGeminiText(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            let retries = 0;
            const maxRetries = 5;

            while (retries < maxRetries) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemInstruction }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const result = await response.json();
                    return JSON.parse(result.candidates[0].content.parts[0].text);
                } catch (e) {
                    retries++;
                    if (retries === maxRetries) throw e;
                    await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
                }
            }
        }

        async function analyzeSketch(base64Image) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = "Analyze this drawing and compare it to a 3D mannequin. Provide three short, constructive tips in English about anatomy or perspective based on what you see.";
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/png", data: base64Image } }
                            ] 
                        }]
                    })
                });
                const result = await response.json();
                return result.candidates[0].content.parts[0].text;
            } catch (e) {
                return "Could not analyze the image right now. Please try again later.";
            }
        }

        // --- UI LOGIC ---

        async function handleGenerate() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) return;

            showLoading(true);
            const system = `You are a 3D rigging expert. Return ONLY JSON. 
            Structure: { chest: {x,y,z,posY}, head: {x,y,z}, leftShoulder, rightShoulder, leftElbow: {x}, rightElbow: {x}, leftHip, rightHip, leftKnee: {x}, rightKnee: {x} }.
            posY for chest should be between 0.5 and 2.0. All rotations in radians.`;

            try {
                const data = await callGeminiText(`Pose: ${prompt}`, system);
                applyPose(data);
                showFeedback(`Pose generated: "${prompt}". Adjust the camera to view the perspective.`);
            } catch (e) {
                showFeedback("An error occurred during generation. Please try again.");
            }
            showLoading(false);
        }

        async function handleImproveLighting() {
            showLoading(true, "Optimizing lighting for current pose...");
            const system = "You are a lighting designer. Given a pose description, suggest a light color in hex (e.g. #ffaa00) and position [x, y, z] to make it look dramatic. Return JSON: { color, position: [x, y, z] }";
            const currentPose = document.getElementById('aiPrompt').value || "neutral pose";
            
            try {
                const data = await callGeminiText(`Pose: ${currentPose}`, system);
                rimLight.color.set(data.color);
                rimLight.position.set(data.position[0], data.position[1], data.position[2]);
                showFeedback(`Lighting improved with ${data.color} hues.`);
            } catch (e) {
                showFeedback("Could not optimize lighting at this moment.");
            }
            showLoading(false);
        }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                const base64 = event.target.result.split(',')[1];
                showLoading(true, "Analyzing your sketch...");
                const feedback = await analyzeSketch(base64);
                showFeedback(feedback);
                showLoading(false);
            };
            reader.readAsDataURL(file);
        }

        function showLoading(show, text = "Gemini is thinking...") {
            const overlay = document.getElementById('loading-overlay');
            document.getElementById('loading-text').innerText = text;
            overlay.style.display = show ? 'flex' : 'none';
        }

        function showFeedback(text) {
            const box = document.getElementById('feedback-area');
            box.style.display = 'block';
            box.innerText = text;
        }

        // --- THREE.JS ---

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(4, 3, 7);
            camera.lookAt(0, 1, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambient);

            mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(5, 10, 5);
            mainLight.castShadow = true;
            scene.add(mainLight);

            rimLight = new THREE.SpotLight(0x00acee, 1.5);
            rimLight.position.set(-5, 5, -5);
            scene.add(rimLight);

            // GRID WITH CONTRAST
            const grid = new THREE.GridHelper(20, 40, 0x00acee, 0x222222);
            scene.add(grid);

            mannequinGroup = new THREE.Group();
            createMannequin();
            scene.add(mannequinGroup);

            setupControls();
            
            document.getElementById('generateBtn').onclick = handleGenerate;
            document.getElementById('improveLightingBtn').onclick = handleImproveLighting;
            document.getElementById('fileInput').onchange = handleFileUpload;
            document.getElementById('poseSelect').onchange = (e) => applyStandardPose(e.target.value);

            animate();
        }

        function createPart(type, size, color = 0xd4a373) {
            let geo;
            if (type === 'sphere') geo = new THREE.SphereGeometry(size, 24, 24);
            else geo = new THREE.CylinderGeometry(size[0], size[1], size[2], 20);
            const mat = new THREE.MeshStandardMaterial({ 
                color, 
                roughness: 0.5, 
                metalness: 0.2,
                emissive: color === 0xd4a373 ? 0x221100 : 0x000000,
                emissiveIntensity: 0.2
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = mesh.receiveShadow = true;
            return mesh;
        }

        function createMannequin() {
            limbs.chest = createPart('capsule', [0.22, 0.18, 0.45]);
            limbs.chest.position.y = 1.45;
            mannequinGroup.add(limbs.chest);

            const waist = createPart('sphere', 0.1, 0x555555);
            waist.position.y = -0.3; limbs.chest.add(waist);

            limbs.hips = createPart('capsule', [0.18, 0.22, 0.3]);
            limbs.hips.position.y = -0.2; waist.add(limbs.hips);

            const neck = createPart('sphere', 0.08, 0x555555);
            neck.position.y = 0.3; limbs.chest.add(neck);
            limbs.head = createPart('sphere', 0.16);
            limbs.head.scale.y = 1.2; limbs.head.position.y = 0.2; neck.add(limbs.head);

            const setupArm = (side) => {
                const shoulder = createPart('sphere', 0.1, 0x555555);
                shoulder.position.set(side * 0.35, 0.25, 0); limbs.chest.add(shoulder);
                const upper = createPart('capsule', [0.08, 0.07, 0.4]); upper.position.y = -0.25; shoulder.add(upper);
                const elbow = createPart('sphere', 0.07, 0x555555); elbow.position.y = -0.22; upper.add(elbow);
                const lower = createPart('capsule', [0.07, 0.06, 0.35]); lower.position.y = -0.22; elbow.add(lower);
                return { shoulder, elbow };
            };
            const lA = setupArm(-1); const rA = setupArm(1);
            limbs.leftShoulder = lA.shoulder; limbs.leftElbow = lA.elbow;
            limbs.rightShoulder = rA.shoulder; limbs.rightElbow = rA.elbow;

            const setupLeg = (side) => {
                const hip = createPart('sphere', 0.12, 0x555555);
                hip.position.set(side * 0.16, -0.15, 0); limbs.hips.add(hip);
                const upper = createPart('capsule', [0.11, 0.08, 0.55]); upper.position.y = -0.35; hip.add(upper);
                const knee = createPart('sphere', 0.09, 0x555555); knee.position.y = -0.32; upper.add(knee);
                const lower = createPart('capsule', [0.08, 0.06, 0.5]); lower.position.y = -0.32; knee.add(lower);
                return { hip, knee };
            };
            const lL = setupLeg(-1); const rL = setupLeg(1);
            limbs.leftHip = lL.hip; limbs.leftKnee = lL.knee;
            limbs.rightHip = rL.hip; limbs.rightKnee = rL.knee;
        }

        function applyPose(data) {
            Object.values(limbs).forEach(o => o.rotation.set(0,0,0));
            if (data.chest) {
                limbs.chest.position.y = Math.max(0.4, data.chest.posY || 1.45);
                ['x','y','z'].forEach(ax => limbs.chest.rotation[ax] = clamp(data.chest[ax] || 0, constraints.chest[ax]));
            }
            const joints = ["head", "leftShoulder", "rightShoulder", "leftElbow", "rightElbow", "leftHip", "rightHip", "leftKnee", "rightKnee"];
            joints.forEach(j => {
                if (data[j] && limbs[j]) {
                    const c = constraints[j];
                    limbs[j].rotation.x = clamp(data[j].x || 0, c.x);
                    if (c.y) limbs[j].rotation.y = clamp(data[j].y || 0, c.y);
                    if (c.z) limbs[j].rotation.z = clamp(data[j].z || 0, c.z);
                }
            });
        }

        function applyStandardPose(name) {
            const poses = {
                standing: {},
                walking: { leftHip: {x: -0.5}, rightHip: {x: 0.5}, rightKnee: {x: 0.5}, leftShoulder: {x: 0.5} },
                running: { chest: {x: 0.4}, leftHip: {x: -1.0}, rightHip: {x: 0.8}, rightKnee: {x: 1.2} },
                sitting: { chest: {posY: 0.9}, leftHip: {x: -1.5}, rightHip: {x: -1.5}, leftKnee: {x: 1.5}, rightKnee: {x: 1.5} },
                crouching: { chest: {posY: 0.8}, leftHip: {x: -2.0}, rightHip: {x: -2.0}, leftKnee: {x: 2.2}, rightKnee: {x: 2.2} },
                jumping: { chest: {posY: 2.0}, leftHip: {x: -0.8}, rightHip: {x: -0.8}, leftKnee: {x: 1.5}, rightKnee: {x: 1.5}, leftShoulder: {x: 2.8}, rightShoulder: {x: 2.8} },
                action: { chest: {posY: 0.6, x: 0.8}, leftHip: {x: -1.2, y: 0.5}, rightHip: {x: -0.5, y: -0.5}, rightKnee: {x: 2.0}, leftShoulder: {x: -0.5, z: -1.0} },
                flying: { chest: {posY: 2.2, x: 1.2}, leftHip: {x: 0.5}, rightHip: {x: 0.3}, leftShoulder: {x: 3.0, z: -0.5}, rightShoulder: {x: 3.0, z: 0.5} },
                sleeping: { chest: {posY: 0.3, z: 1.5}, head: {x: -0.5}, leftHip: {x: -0.3}, rightHip: {x: -0.2} }
            };
            applyPose(poses[name] || {});
        }

        function setupControls() {
            const el = renderer.domElement;
            const startDrag = (x, y) => { isDragging = true; previousMousePosition = { x, y }; };
            const endDrag = () => { isDragging = false; };
            const moveDrag = (x, y) => {
                if (!isDragging) return;
                scene.rotation.y += (x - previousMousePosition.x) * 0.01;
                scene.rotation.x += (y - previousMousePosition.y) * 0.01;
                previousMousePosition = { x, y };
            };

            el.onmousedown = (e) => startDrag(e.offsetX, e.offsetY);
            window.onmouseup = endDrag;
            window.onmousemove = (e) => moveDrag(e.offsetX, e.offsetY);

            el.ontouchstart = (e) => startDrag(e.touches[0].pageX, e.touches[0].pageY);
            el.ontouchend = endDrag;
            el.ontouchmove = (e) => moveDrag(e.touches[0].pageX, e.touches[0].pageY);

            el.onwheel = (e) => {
                camera.position.z = Math.max(3, Math.min(15, camera.position.z + e.deltaY * 0.01));
                e.preventDefault();
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.onload = init;
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
