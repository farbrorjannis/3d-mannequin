<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D AI Mannequin - Mobile & High Contrast</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #050505;
            color: #e0e0e0;
            touch-action: none; /* Prevents default browser zooming/panning */
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(10, 10, 10, 0.9);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #333;
            max-width: 320px;
            max-height: 85vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        @media (max-width: 480px) {
            #ui-container { width: auto; margin-right: 10px; }
            h2 { font-size: 18px; }
        }
        h2 { margin: 0 0 4px 0; font-size: 20px; color: #d4a373; font-weight: 800; }
        .subtitle { font-size: 9px; color: #666; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1.5px; }
        hr { border: 0; border-top: 1px solid #222; margin: 15px 0; }
        label { font-size: 10px; color: #888; display: block; margin-bottom: 4px; text-transform: uppercase; font-weight: 600; }
        
        select, button, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 4px;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 14px;
            -webkit-appearance: none; /* Mobile fix */
        }
        textarea { height: 60px; resize: none; border-color: #2a2a2a; }
        
        button { 
            background: linear-gradient(135deg, #d4a373 0%, #a98467 100%); 
            color: #000;
            border: none; 
            font-weight: 700; 
            margin-top: 8px;
            text-transform: uppercase;
        }
        button:active { transform: scale(0.98); }

        .ai-card {
            background: rgba(212, 163, 115, 0.05);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(212, 163, 115, 0.2);
            margin-bottom: 10px;
        }

        #feedback-box {
            margin-top: 10px;
            padding: 10px;
            background: #000;
            border-radius: 6px;
            font-size: 12px;
            color: #ccc;
            border-left: 2px solid #d4a373;
            display: none;
        }
        
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            flex-direction: column;
        }
        .spinner {
            border: 3px solid rgba(212, 163, 115, 0.1);
            border-left-color: #d4a373;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text" style="color: #d4a373; margin-top: 15px; font-size: 10px; letter-spacing: 1px;">SYNCING...</p>
    </div>

    <div id="ui-container">
        <h2>POSER AI</h2>
        <div class="subtitle">Mobile Ready Artist Reference</div>
        
        <label>Common Presets</label>
        <select id="poseSelect">
            <option value="standing">Neutral Standing</option>
            <option value="walking">Walking Cycle</option>
            <option value="sitting">Standard Sitting</option>
            <option value="running">Dynamic Sprint</option>
            <option value="tying_shoes">Tying Shoes</option>
            <option value="climbing">Climbing Wall</option>
            <option value="yoga">Yoga Tree Pose</option>
            <option value="lying">Lying Side</option>
            <option value="action">Hero Landing</option>
        </select>

        <hr>

        <div class="ai-card">
            <label>✨ AI Custom Pose</label>
            <textarea id="aiPrompt" placeholder="Describe a pose..."></textarea>
            <button id="generateBtn">Generate ✨</button>
        </div>

        <button id="autoLightBtn" style="background: #222; color: #d4a373; border: 1px solid #d4a373; margin-top: 0;">Improve Lighting ✨</button>
        <div id="feedback-box"></div>
    </div>

    <script>
        const apiKey = ""; 
        let scene, camera, renderer, mannequinGroup;
        let isDragging = false;
        let previousTouch = { x: 0, y: 0 };
        let previousMousePosition = { x: 0, y: 0 };
        const limbs = {};
        let currentLights = [];

        // Realistic Anatomical Constraints
        const constraints = {
            head: { x: [-0.6, 0.8], y: [-1.2, 1.2], z: [-0.4, 0.4] },
            chest: { x: [-0.3, 0.5], y: [-0.7, 0.7], z: [-0.3, 0.3] },
            leftShoulder: { x: [-1.5, 3.1], y: [-1.2, 1.2], z: [-1.5, 0.5] },
            rightShoulder: { x: [-1.5, 3.1], y: [-1.2, 1.2], z: [-0.5, 1.5] },
            leftElbow: { x: [-2.5, 0] },
            rightElbow: { x: [-2.5, 0] },
            leftHip: { x: [-1.8, 0.5], y: [-0.5, 0.5], z: [-0.5, 0.2] },
            rightHip: { x: [-1.8, 0.5], y: [-0.5, 0.5], z: [-0.2, 0.5] },
            leftKnee: { x: [0, 2.5] },
            rightKnee: { x: [0, 2.5] }
        };

        const clamp = (val, range) => range ? Math.max(range[0], Math.min(range[1], val)) : val;

        async function callGemini(prompt, system, isJson = true) {
            let retries = 0;
            while (retries < 5) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: system }] },
                            generationConfig: isJson ? { responseMimeType: "application/json" } : {}
                        })
                    });
                    const result = await response.json();
                    const text = result.candidates[0].content.parts[0].text;
                    return isJson ? JSON.parse(text) : text;
                } catch (e) {
                    retries++;
                    await new Promise(r => setTimeout(r, 1000 * Math.pow(2, retries)));
                }
            }
            return null;
        }

        async function handleGenerate() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) return;
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            
            try {
                const system = `Expert 3D Rigger. JSON ONLY. Joints: chest(x,y,z,posY), head(x,y,z), leftShoulder, rightShoulder, leftElbow(x), rightElbow(x), leftHip, rightHip, leftKnee(x), rightKnee(x). Ensure knees bend forward only (positive X).`;
                const data = await callGemini(`Pose: ${prompt}`, system);
                if (data) applyPose(data);
                
                const feedback = await callGemini(`Give 1 short tip for drawing this pose: ${prompt}`, "Drawing instructor", false);
                const fbBox = document.getElementById('feedback-box');
                fbBox.style.display = 'block';
                fbBox.innerText = feedback;
            } catch (e) {}
            overlay.style.display = 'none';
        }

        function applyPose(data) {
            Object.values(limbs).forEach(o => o.rotation.set(0,0,0));
            if (data.chest) {
                limbs.chest.position.y = Math.max(0.4, data.chest.posY || 1.45);
                ['x','y','z'].forEach(ax => limbs.chest.rotation[ax] = clamp(data.chest[ax] || 0, constraints.chest[ax]));
            }
            const joints = ["head", "leftShoulder", "rightShoulder", "leftElbow", "rightElbow", "leftHip", "rightHip", "leftKnee", "rightKnee"];
            joints.forEach(j => {
                if (data[j] && limbs[j]) {
                    const c = constraints[j];
                    limbs[j].rotation.x = clamp(data[j].x || 0, c.x);
                    if (c.y) limbs[j].rotation.y = clamp(data[j].y || 0, c.y);
                    if (c.z) limbs[j].rotation.z = clamp(data[j].z || 0, c.z);
                }
            });
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(4, 2, 6);
            camera.lookAt(0, 1.2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limit for mobile performance
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // HIGH CONTRAST LIGHTING
            scene.add(new THREE.AmbientLight(0xffffff, 0.1)); // Very low ambient
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(5, 10, 5);
            mainLight.castShadow = true;
            scene.add(mainLight);

            // Rim Light for high contrast edge
            const rimLight = new THREE.SpotLight(0xffffff, 2);
            rimLight.position.set(-5, 5, -5);
            scene.add(rimLight);

            scene.add(new THREE.GridHelper(20, 40, 0x111111, 0x080808));
            
            mannequinGroup = new THREE.Group();
            createMannequin();
            scene.add(mannequinGroup);

            setupControls();
            
            document.getElementById('generateBtn').onclick = handleGenerate;
            document.getElementById('poseSelect').onchange = (e) => applyStandardPose(e.target.value);
            document.getElementById('autoLightBtn').onclick = () => {
                currentLights.forEach(l => scene.remove(l));
                const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xd4a373];
                const l = new THREE.PointLight(colors[Math.floor(Math.random()*colors.length)], 2, 10);
                l.position.set(Math.random()*4-2, 2, Math.random()*4-2);
                scene.add(l);
                currentLights = [l];
            };

            animate();
        }

        function createPart(type, size, color = 0xd4a373) {
            let geo;
            if (type === 'sphere') geo = new THREE.SphereGeometry(size, 20, 20);
            else geo = new THREE.CylinderGeometry(size[0], size[1], size[2], 16);
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.1 }));
            mesh.castShadow = mesh.receiveShadow = true;
            return mesh;
        }

        function createMannequin() {
            limbs.chest = createPart('capsule', [0.22, 0.18, 0.45]);
            limbs.chest.position.y = 1.45;
            mannequinGroup.add(limbs.chest);

            const waist = createPart('sphere', 0.1, 0x8d6e63);
            waist.position.y = -0.3; limbs.chest.add(waist);

            limbs.hips = createPart('capsule', [0.18, 0.22, 0.3]);
            limbs.hips.position.y = -0.2; waist.add(limbs.hips);

            const neck = createPart('sphere', 0.08, 0x8d6e63);
            neck.position.y = 0.3; limbs.chest.add(neck);
            limbs.head = createPart('sphere', 0.16);
            limbs.head.scale.y = 1.2; limbs.head.position.y = 0.2; neck.add(limbs.head);

            const setupArm = (s) => {
                const j = createPart('sphere', 0.1, 0x8d6e63);
                j.position.set(s * 0.35, 0.25, 0); limbs.chest.add(j);
                const u = createPart('capsule', [0.08, 0.07, 0.4]); u.position.y = -0.25; j.add(u);
                const ej = createPart('sphere', 0.07, 0x8d6e63); ej.position.y = -0.22; u.add(ej);
                const l = createPart('capsule', [0.07, 0.06, 0.35]); l.position.y = -0.22; ej.add(l);
                return { j, ej };
            };
            const lA = setupArm(-1); const rA = setupArm(1);
            limbs.leftShoulder = lA.j; limbs.leftElbow = lA.ej;
            limbs.rightShoulder = rA.j; limbs.rightElbow = rA.ej;

            const setupLeg = (s) => {
                const j = createPart('sphere', 0.12, 0x8d6e63);
                j.position.set(s * 0.16, -0.15, 0); limbs.hips.add(j);
                const u = createPart('capsule', [0.11, 0.08, 0.55]); u.position.y = -0.35; j.add(u);
                const kj = createPart('sphere', 0.09, 0x8d6e63); kj.position.y = -0.32; u.add(kj);
                const l = createPart('capsule', [0.08, 0.06, 0.5]); l.position.y = -0.32; kj.add(l);
                return { j, kj };
            };
            const lL = setupLeg(-1); const rL = setupLeg(1);
            limbs.leftHip = lL.j; limbs.leftKnee = lL.kj;
            limbs.rightHip = rL.j; limbs.rightKnee = rL.kj;
        }

        function applyStandardPose(name) {
            Object.values(limbs).forEach(o => o.rotation.set(0,0,0));
            limbs.chest.position.y = 1.45;
            switch(name) {
                case 'walking':
                    limbs.leftHip.rotation.x = -0.5; limbs.rightHip.rotation.x = 0.5;
                    limbs.rightKnee.rotation.x = 0.5; limbs.leftShoulder.rotation.x = 0.5;
                    break;
                case 'sitting':
                    limbs.chest.position.y = 1.0;
                    limbs.leftHip.rotation.x = -1.5; limbs.rightHip.rotation.x = -1.5;
                    limbs.leftKnee.rotation.x = 1.5; limbs.rightKnee.rotation.x = 1.5;
                    break;
                case 'tying_shoes':
                    limbs.chest.position.y = 0.9;
                    limbs.chest.rotation.x = 0.4;
                    limbs.leftHip.rotation.x = -1.5; limbs.rightHip.rotation.x = -1.2;
                    limbs.leftKnee.rotation.x = 1.6; limbs.leftShoulder.rotation.x = 0.8;
                    break;
                case 'yoga':
                    limbs.leftHip.rotation.z = -0.5; limbs.leftHip.rotation.x = -1.2;
                    limbs.leftKnee.rotation.x = 2.0;
                    limbs.leftShoulder.rotation.z = -2.5; limbs.rightShoulder.rotation.z = 2.5;
                    break;
                case 'lying':
                    limbs.chest.position.y = 0.5;
                    scene.rotation.z = Math.PI/2;
                    limbs.leftHip.rotation.x = -0.5;
                    break;
                case 'running':
                    limbs.chest.rotation.x = 0.4;
                    limbs.leftHip.rotation.x = -1.0; limbs.rightHip.rotation.x = 0.8;
                    limbs.rightKnee.rotation.x = 1.2;
                    break;
            }
        }

        function setupControls() {
            const el = renderer.domElement;
            // Mouse
            el.onmousedown = () => isDragging = true;
            window.onmouseup = () => isDragging = false;
            window.onmousemove = (e) => {
                if (isDragging) {
                    scene.rotation.y += (e.offsetX - previousMousePosition.x) * 0.01;
                    scene.rotation.x += (e.offsetY - previousMousePosition.y) * 0.01;
                }
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            };

            // Touch (Mobile)
            el.addEventListener('touchstart', (e) => {
                isDragging = true;
                previousTouch = { x: e.touches[0].pageX, y: e.touches[0].pageY };
            }, { passive: true });
            el.addEventListener('touchend', () => isDragging = false);
            el.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    const touch = e.touches[0];
                    scene.rotation.y += (touch.pageX - previousTouch.x) * 0.01;
                    scene.rotation.x += (touch.pageY - previousTouch.y) * 0.01;
                    previousTouch = { x: touch.pageX, y: touch.pageY };
                }
            }, { passive: true });
            
            el.onwheel = (e) => {
                camera.position.z = Math.max(3, Math.min(12, camera.position.z + e.deltaY * 0.01));
                e.preventDefault();
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.onload = init;
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
